name: Build and Release DuskRay

# Manual-only workflow. It will:
#   - build DuskRay.exe on a Windows runner
#   - upload it as a workflow artifact
#   - create a GitHub Release tagged with the version you and
#     DuskRay.exe attached

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icon
        run: python generate_icon.py

      - name: Build DuskRay.exe
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole --clean `
            --name "DuskRay" `
            --icon=duskray.ico `
            --version-file=version_info.txt `
            --exclude-module tkinter `
            --exclude-module unittest `
            --exclude-module pdb `
            --exclude-module doctest `
            --exclude-module test `
            duskray.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuskRay-windows-exe
          path: dist/DuskRay.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: dist/DuskRay.exe
          generate_release_notes: true
